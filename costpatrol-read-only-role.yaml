AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CostPatrol Read-Only Access Role.
  Grants CostPatrol read-only access to your AWS account for cost optimization
  scanning and anomaly detection. No write permissions are granted.

Parameters:
  CostPatrolAccountId:
    Type: String
    Description: CostPatrol's AWS Account ID (provided during onboarding)
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS Account ID

  ExternalId:
    Type: String
    Description: Unique external ID for secure cross-account access (provided during onboarding)
    MinLength: 16
    MaxLength: 128

  Environment:
    Type: String
    Default: ''
    AllowedValues:
      - ''
      - 'production'
      - 'non-production'
    Description: >
      Optional: classify this account as production or non-production for
      CostPatrol threshold tuning. If left blank, CostPatrol will auto-detect.

Resources:
  CostPatrolRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CostPatrolReadOnly
      Description: Read-only role for CostPatrol cost optimization scanning
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${CostPatrolAccountId}:root'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: CostPatrolReadOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Cost Explorer — cost data, forecasts, RI/SP coverage and recommendations
              - Sid: CostExplorerReadOnly
                Effect: Allow
                Action:
                  - ce:GetCostAndUsage
                  - ce:GetCostForecast
                  - ce:GetDimensionValues
                  - ce:GetReservationUtilization
                  - ce:GetReservationCoverage
                  - ce:GetReservationPurchaseRecommendation
                  - ce:GetSavingsPlansUtilization
                  - ce:GetSavingsPlansCoverage
                  - ce:GetSavingsPlansPurchaseRecommendation
                  - ce:ListCostAllocationTags
                Resource: '*'

              # CloudWatch — metrics, alarms, metric streams, and Logs Insights
              - Sid: CloudWatchReadOnly
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:ListMetricStreams
                  - cloudwatch:GetMetricStream
                  - logs:DescribeLogGroups
                  - logs:StartQuery
                  - logs:GetQueryResults
                Resource: '*'

              # EC2 — instance, volume, NAT gateway, VPC, VPN, networking, AMI metadata
              - Sid: EC2ReadOnly
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeVolumes
                  - ec2:DescribeFastSnapshotRestores
                  - ec2:DescribeNatGateways
                  - ec2:DescribeVpcEndpoints
                  - ec2:DescribeVpcs
                  - ec2:DescribeAddresses
                  - ec2:DescribeSnapshots
                  - ec2:DescribeTransitGateways
                  - ec2:DescribeTransitGatewayAttachments
                  - ec2:DescribeVpnConnections
                  - ec2:DescribePrefixLists
                  - ec2:DescribeFlowLogs
                  - ec2:DescribeRouteTables
                  - ec2:DescribeSubnets
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:DescribeImages
                Resource: '*'

              # Lambda — function metadata and provisioned concurrency
              - Sid: LambdaReadOnly
                Effect: Allow
                Action:
                  - lambda:ListFunctions
                  - lambda:GetFunction
                  - lambda:ListProvisionedConcurrencyConfigs
                Resource: '*'

              # RDS — database instance, cluster, snapshot, and reservation metadata
              - Sid: RDSReadOnly
                Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                  - rds:DescribeDBSnapshots
                  - rds:DescribeDBClusterSnapshots
                  - rds:DescribeDBClusters
                  - rds:DescribeReservedDBInstances
                  - rds:DescribeOrderableDBInstanceOptions
                  - rds:ListTagsForResource
                Resource: '*'

              # DynamoDB — table metadata
              - Sid: DynamoDBReadOnly
                Effect: Allow
                Action:
                  - dynamodb:ListTables
                  - dynamodb:DescribeTable
                  - dynamodb:DescribeTimeToLive
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:ListTagsOfResource
                Resource: '*'

              # S3 — bucket metadata, encryption, lifecycle, intelligent-tiering, multipart
              - Sid: S3ReadOnly
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                  - s3:GetLifecycleConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:ListBucketIntelligentTieringConfigurations
                  - s3:ListBucketMultipartUploads
                Resource: '*'

              # ELB — load balancer, target group, and target health metadata
              - Sid: ELBReadOnly
                Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetHealth
                Resource: '*'

              # ECS — cluster, service, and task definition metadata
              - Sid: ECSReadOnly
                Effect: Allow
                Action:
                  - ecs:ListClusters
                  - ecs:DescribeClusters
                  - ecs:ListServices
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                Resource: '*'

              # SageMaker — notebook and endpoint metadata
              - Sid: SageMakerReadOnly
                Effect: Allow
                Action:
                  - sagemaker:ListNotebookInstances
                  - sagemaker:DescribeNotebookInstance
                  - sagemaker:ListEndpoints
                  - sagemaker:DescribeEndpoint
                Resource: '*'

              # ElastiCache — cluster metadata
              - Sid: ElastiCacheReadOnly
                Effect: Allow
                Action:
                  - elasticache:DescribeCacheClusters
                Resource: '*'

              # API Gateway — REST API metadata
              - Sid: APIGatewayReadOnly
                Effect: Allow
                Action:
                  - apigateway:GET
                Resource: '*'

              # Backup — vault, plan, and tag metadata
              - Sid: BackupReadOnly
                Effect: Allow
                Action:
                  - backup:ListBackupVaults
                  - backup:ListBackupPlans
                  - backup:GetBackupPlan
                  - backup:ListTags
                Resource: '*'

              # Budgets — budget and notification metadata
              - Sid: BudgetsReadOnly
                Effect: Allow
                Action:
                  - budgets:DescribeBudgets
                  - budgets:DescribeNotificationsForBudget
                Resource: '*'

              # CloudFront — distribution metadata
              - Sid: CloudFrontReadOnly
                Effect: Allow
                Action:
                  - cloudfront:ListDistributions
                Resource: '*'

              # CloudTrail — trail, status, and event selector metadata
              - Sid: CloudTrailReadOnly
                Effect: Allow
                Action:
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrailStatus
                  - cloudtrail:GetEventSelectors
                Resource: '*'

              # Compute Optimizer — rightsizing recommendations
              - Sid: ComputeOptimizerReadOnly
                Effect: Allow
                Action:
                  - compute-optimizer:GetEC2InstanceRecommendations
                Resource: '*'

              # AWS Config — config recorder and discovered resource metadata
              - Sid: ConfigReadOnly
                Effect: Allow
                Action:
                  - config:DescribeConfigurationRecorders
                  - config:DescribeConfigurationRecorderStatus
                  - config:GetDiscoveredResourceCounts
                Resource: '*'

              # GuardDuty — detector configuration metadata
              - Sid: GuardDutyReadOnly
                Effect: Allow
                Action:
                  - guardduty:ListDetectors
                  - guardduty:GetDetector
                Resource: '*'

              # Application Auto Scaling — DynamoDB/ECS scaling configuration
              - Sid: ApplicationAutoScalingReadOnly
                Effect: Allow
                Action:
                  - application-autoscaling:DescribeScalableTargets
                  - application-autoscaling:DescribeScalingPolicies
                Resource: '*'

              # DocumentDB — cluster and instance metadata
              - Sid: DocumentDBReadOnly
                Effect: Allow
                Action:
                  - docdb:DescribeDBClusters
                  - docdb:DescribeDBInstances
                Resource: '*'

              # Neptune — cluster and instance metadata
              - Sid: NeptuneReadOnly
                Effect: Allow
                Action:
                  - neptune:DescribeDBClusters
                  - neptune:DescribeDBInstances
                Resource: '*'

              # AWS Pricing — public pricing catalog used for live region pricing
              - Sid: PricingReadOnly
                Effect: Allow
                Action:
                  - pricing:GetProducts
                Resource: '*'

              # ECR — container registry metadata
              - Sid: ECRReadOnly
                Effect: Allow
                Action:
                  - ecr:DescribeRepositories
                  - ecr:GetLifecyclePolicy
                  - ecr:DescribeImages
                Resource: '*'

              # EFS — file system metadata
              - Sid: EFSReadOnly
                Effect: Allow
                Action:
                  - elasticfilesystem:DescribeFileSystems
                  - elasticfilesystem:DescribeLifecycleConfiguration
                Resource: '*'

              # EKS — cluster and node group metadata
              - Sid: EKSReadOnly
                Effect: Allow
                Action:
                  - eks:ListClusters
                  - eks:DescribeCluster
                  - eks:ListNodegroups
                  - eks:DescribeNodegroup
                Resource: '*'

              # EMR — cluster metadata
              - Sid: EMRReadOnly
                Effect: Allow
                Action:
                  - elasticmapreduce:ListClusters
                  - elasticmapreduce:ListInstanceGroups
                Resource: '*'

              # Glue — job and dev endpoint metadata
              - Sid: GlueReadOnly
                Effect: Allow
                Action:
                  - glue:GetDevEndpoints
                  - glue:GetJobs
                  - glue:GetJobRuns
                Resource: '*'

              # Kafka (MSK) — cluster metadata
              - Sid: MSKReadOnly
                Effect: Allow
                Action:
                  - kafka:ListClustersV2
                Resource: '*'

              # Keyspaces — table metadata
              - Sid: KeyspacesReadOnly
                Effect: Allow
                Action:
                  - keyspaces:ListKeyspaces
                  - keyspaces:ListTables
                  - keyspaces:GetTable
                Resource: '*'

              # Kinesis — stream metadata
              - Sid: KinesisReadOnly
                Effect: Allow
                Action:
                  - kinesis:ListStreams
                  - kinesis:DescribeStreamSummary
                Resource: '*'

              # KMS — key metadata
              - Sid: KMSReadOnly
                Effect: Allow
                Action:
                  - kms:ListKeys
                  - kms:DescribeKey
                  - kms:ListGrants
                Resource: '*'

              # MemoryDB — cluster and reservation metadata
              - Sid: MemoryDBReadOnly
                Effect: Allow
                Action:
                  - memorydb:DescribeClusters
                  - memorydb:DescribeReservedNodes
                Resource: '*'

              # OpenSearch — domain and reservation metadata
              - Sid: OpenSearchReadOnly
                Effect: Allow
                Action:
                  - es:ListDomainNames
                  - es:DescribeDomain
                  - es:DescribeReservedInstances
                Resource: '*'

              # Redshift — provisioned and serverless cluster metadata
              - Sid: RedshiftReadOnly
                Effect: Allow
                Action:
                  - redshift:DescribeClusters
                  - redshift-serverless:ListWorkgroups
                Resource: '*'

              # Route 53 — hosted zone and record set metadata
              - Sid: Route53ReadOnly
                Effect: Allow
                Action:
                  - route53:ListHostedZones
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource: '*'

              # Step Functions — state machine metadata
              - Sid: StepFunctionsReadOnly
                Effect: Allow
                Action:
                  - states:ListStateMachines
                  - states:DescribeStateMachine
                Resource: '*'

              # Timestream — database and table metadata
              - Sid: TimestreamReadOnly
                Effect: Allow
                Action:
                  - timestream:ListDatabases
                  - timestream:ListTables
                Resource: '*'

              # Transfer Family — server metadata
              - Sid: TransferReadOnly
                Effect: Allow
                Action:
                  - transfer:ListServers
                Resource: '*'

              # Organizations — detect org membership and enumerate member accounts
              - Sid: OrganizationsDetect
                Effect: Allow
                Action:
                  - organizations:DescribeOrganization
                  - organizations:ListAccounts
                Resource: '*'

              # IAM — account alias for environment detection
              - Sid: IAMAccountAlias
                Effect: Allow
                Action:
                  - iam:ListAccountAliases
                Resource: '*'

Outputs:
  RoleArn:
    Description: ARN of the CostPatrol read-only role. Provide this to CostPatrol to complete setup.
    Value: !GetAtt CostPatrolRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'
